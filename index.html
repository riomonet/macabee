<!DOCTYPE html>
<html>
    <head>
        <style>

         .generic-slot:focus {
             outline: none;
             box-shadow: none;
         }
         
         .generic-slot {
             position: absolute;
             font-family: monospace;
             font-size: 16px;
             border: none;
             background: transparent;
             padding: 0;
             margin: 0;
             height: 1em;
             
             /* Drive coordinates using typography-grid registers */
             top: calc(var(--row) * 1em);
             left: calc(var(--col) * 1ch);
             width: calc(var(--len) * 1ch);
         }


         /* Rigid input tracking frame */
         .generic-slot:not([readonly]) {
             border-bottom: 1px solid black;
         }
        </style>
    </head>
    <body>
        <div id="terminal"></div>
        <script>

         
         const MAX_SLOTS = 100;
         const INPUTS  = [];
         const SLOT_POOL = new Array(MAX_SLOTS);
         const terminal = document.getElementById('terminal');
         const url = "ws://localhost:8001/ws"

         
         for (let i = 0; i < MAX_SLOTS; i++) {
	         const input = document.createElement('input');

             input.layout = {
                 id: 0,
                 typ: 0,
                 col: 0,
                 row: 0,
                 width: 0,
                 r1: 0,
                 r2: 0,
                 r3: 0
             };

              input.state = {
                  id: 0,
                  flags: 0,
                  fgColor: 0,
                  bgColor: 0,
                  len: 0,
                  r1: 0,
                  r2: 0,
                  r3: 0
              };

	         input.className = 'generic-slot';
	         input.style.display = 'none'; // Keep it dark until bytes arrive
	         input.disabled= true;
	         input.tabIndex = -1;
	         input.slotId = i;
	         input.isDirty = false;
             input.autocomplete = 'off';
             input.spellcheck = false;
             input.autocorrect = 'off';
             input.autocapitalize = 'off';
	         terminal.appendChild(input);
	         SLOT_POOL[i] = input;
         }
         
         const socket = sys_net_init(url);
         disableTabDefaults();
         add_AID_keys();



         const AID_KEYS = Object.freeze ({
             'Enter': 0x7D,
             'F1':    0xF1,
             'F2':    0xF2,
             'F3':    0xF3,
             'F4':    0xF4,
             'F5':    0xF5,
             'F6':    0xF6,
             'F7':    0xF7,
             'F8':    0xF8,
             'F9':    0xF9,
             'F10':   0x7A,
             'F11':   0x7B,
             'F12':   0x7C,
         });
         
         /* Manually manage active focus change on tab key andhsift tab */
         function  disableTabDefaults() {
             terminal.addEventListener('keydown', function(e) {
                 if (e.key !== 'Tab') return;

                 e.preventDefault();


                 if (INPUTS.length === 0) return;

                 const current = document.activeElement;

                 let idx = INPUTS.indexOf(current);

                 if (e.shiftKey) {
                     idx--;
                     if (idx < 0)
                         idx = INPUTS.length - 1;
                 } else {
                     idx++;
                     if (idx >= INPUTS.length)
                         idx = 0;
                 }
                 INPUTS[idx].focus();
             });
         }

         /* Header */
         /* |AID Key 1b| nFields | */
         /* Field blocks */
         /* |field_id 1b| field_len 1b| field_val | */
         function send_changed_inputs_only(key) {
          
             const MDT = [];
             let bytes = 0;
             const encoder = new TextEncoder();
             const AID = AID_KEYS[key];
             
             bytes++; /* AIDkey 1b*/
             bytes++; /* nFields 1b*/
             for (let i = 0; i < INPUTS.length; i++) {
                 if (INPUTS[i].isDirty) {
                     MDT.push(INPUTS[i]);
                     bytes++; /* field_id 1b*/
                     bytes++; /* field_len 1b*/

                     bytes += INPUTS[i].value.length;
                 }
             }
             const buffer = new ArrayBuffer(bytes);
             const copybook = new Uint8Array(buffer);
             let pos = 0;
             copybook[pos++] =AID; //aidkey resolve
             copybook[pos++] = MDT.length;
             for(let i = 0; i <  MDT.length; i++) {
                 copybook[pos++] = MDT[i].state.id;
                 copybook[pos++] = MDT[i].value.length;
                 const text = encoder.encode(MDT[i].value);
                 copybook.set(text,pos);
                 pos += text.length;
             }
             console.log(socket);
             socket.send(buffer);
         }
         
         function add_key_event_listeners(key, event, callback) {
	         terminal.addEventListener(event, function(e) {
                 if (e.key === key) {
		             e.preventDefault();
		             callback(key);
                 }
	         });
         }

         function add_AID_keys() {
	         add_key_event_listeners('Enter', 'keydown',send_changed_inputs_only);
         }

         function set_dirty() {
	         this.isDirty = true;
         }

         function sys_render_terminal(arrayBuffer) {
             
             const view             = new DataView(arrayBuffer);
	         const decoder          = new TextDecoder('utf-8');
             const headerSize       = 8;
             const opcodeA          = view.getUint8(0);
             const opcodeB          = view.getUint8(1);
             const fieldCount       = view.getUint8(2);
             const reserved         = view.getUint8(3);
             const layoutBytesSz    = view.getUint16(4,true);
             const stateBytesSz     = view.getUint16(6,true);
             const layoutBase       = headerSize;
             const stateBase        = layoutBase + layoutBytesSz;

             const layout_struct    = 8;
             const state_struct     = 48;
             const IC               = -1; /* Initial cursor flag */

             for (let i             = 0; i < fieldCount; i++) {
                 const handle       = SLOT_POOL[i];
                 const layoutOffset = layoutBase + (i * layout_struct);
                 const stateOffset  = stateBase + (i * state_struct);

                 // Layout
                 const layoutId  = view.getUint8(layoutOffset + 0);
                 const typ       = view.getUint8(layoutOffset + 1);
                 const col       = view.getUint8(layoutOffset + 2);
                 const row       = view.getUint8(layoutOffset + 3);
                 const width     = view.getUint8(layoutOffset + 4);
                 const layout_r1 = view.getUint8(layoutOffset + 5);
                 const layout_r2 = view.getUint8(layoutOffset + 6);
                 const layout_r3 = view.getUint8(layoutOffset + 7);


                 // State
                 const stateId   = view.getUint8(stateOffset + 0);
                 const flags     = view.getUint8(stateOffset + 1);
                 const fgColor   = view.getUint8(stateOffset + 2);
                 const bgColor   = view.getUint8(stateOffset + 3);
                 const textLen   = view.getUint8(stateOffset + 4);
                 const stateR1   = view.getUint8(stateOffset + 5);
                 const stateR2   = view.getUint8(stateOffset + 6);
                 const stateR3   = view.getUint8(stateOffset + 7);
                 const textBytes = new Uint8Array(arrayBuffer, stateOffset + 8, textLen);

                 handle.layout.id = layoutId;
                 handle.layout.typ = typ;
                 handle.layout.col = col;
                 handle.layout.row = row;
                 handle.layout.width = width;
                 
                 handle.state.id = stateId;
                 handle.state.flags = flags
                 handle.state.fgColor = fgColor;
                 handle.state.bgColor = bgColor;
                 handle.state.len = textLen

		         handle.value = decoder.decode(textBytes);                 
	             handle.style.display = 'block';
	             handle.disabled = false;
                 handle.style.setProperty('--row', handle.layout.row);
                 handle.style.setProperty('--col', handle.layout.col);
                 handle.style.setProperty('--len', handle.layout.width);
                 handle.maxLength = handle.layout.width;

                 if (handle.layout.typ === 1) {
                     handle.readOnly = true;
                     handle.classList.add('label');
                 } else {
                     handle.readOnly = false;
		             handle.tabIndex = 0;
		             handle.oninput = set_dirty;
                     INPUTS.push(handle);
                 }
             }
             /* TODO: this should be encoded in flags */
             SLOT_POOL[2].focus();
         }

         function sys_net_init(url) {
	         const socket = new WebSocket(url);
	         socket.binaryType = "arraybuffer";  
	         socket.onmessage = function(event) {
                 sys_render_terminal(event.data);
	         };

	         socket.onopen = ()  =>
	             {
		             console.log  ("Network pipeline connected to C backend.");
		             socket.send(Uint8Array.of(0xFF));
	             }
             
	         socket.onerror = (err) => console.error("Network socket error:", err);
	         socket.onclose = ()    => console.log  ("Network pipeline disconnected.");
	         return socket;
         }
        </script>
    </body>
</html>

     MDT → Modified Data Tag
     IC → Initial Cursor
     PROT → Protected
     NUM → Numeric-only
     AID → Attention Identifier (Enter/PF keys -->
